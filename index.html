<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prof. Dr. Murillo Cesar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C8A22A;
      --goldf: #F0D060;
      --goldd: #6B4E0A;
      --black: #080705;
      --dark: #0e0c08;
      --dark2: #181410;
      --white: #FDFAF2;
      --gray: #8a8070;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,162,42,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(200,162,42,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      position: relative;
      z-index: 1;
    }

    /* ── FOTO ── */
    .photo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease both;
    }

    .photo-ring {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .photo-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--goldd), var(--goldf), var(--goldd));
      z-index: 0;
      animation: spinRing 6s linear infinite;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .photo-ring img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      position: relative;
      z-index: 1;
      border: 3px solid var(--dark);
      filter: grayscale(20%) contrast(1.05);
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.9s ease 0.1s both;
    }

    .header .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 7vw, 42px);
      font-weight: 600;
      letter-spacing: .02em;
      line-height: 1.1;
      color: var(--white);
    }

    .header h1 span {
      display: block;
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
      font-size: .75em;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto 12px;
    }

    .header .bio {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--gray);
      line-height: 1.6;
    }

    /* ── SECTION TITLE ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--goldd);
      text-align: center;
      margin-bottom: 16px;
      position: relative;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--goldd));
    }
    .section-label::before { left: 0; }
    .section-label::after { right: 0; transform: scaleX(-1); }

/* ── BUTTONS ── */
/* ── BUTTONS ── */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-radius: 4px;
  border: none;
  background: linear-gradient(90deg, #6B4E0A, #C8A22A, #F0D060, #C8A22A);
  background-size: 200% auto;
  color: #080705;
  text-decoration: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background-position .4s ease, transform .2s ease, box-shadow .2s ease;
  animation: fadeUp 0.6s ease both;
}

.btn:hover {
  background-position: right center;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(200,162,42,0.25);
}

.btn .btn-icon {
  font-size: 16px;
  opacity: 0.6;
  transition: opacity .3s, transform .3s;
}

.btn:hover .btn-icon {
  opacity: 1;
  transform: translateX(4px);
}

.btn-gold {
  background: linear-gradient(90deg, #3a2800, #C8A22A, #F0D060, #C8A22A);
  background-size: 200% auto;
}

.btn-wa {
  background: linear-gradient(90deg, #075e3a, #25D366, #6ef7a7, #25D366);
  background-size: 200% auto;
  color: #080705;
}

.btn-wa:hover {
  box-shadow: 0 8px 24px rgba(37,211,102,0.2);
}

.btn-wa .btn-icon { opacity: 1; }

.btn:nth-child(1) { animation-delay: 0.2s; }
.btn:nth-child(2) { animation-delay: 0.3s; }
.btn:nth-child(3) { animation-delay: 0.4s; }
.btn:nth-child(4) { animation-delay: 0.5s; }
.btn:nth-child(5) { animation-delay: 0.6s; }
.btn:nth-child(6) { animation-delay: 0.7s; }
    <!-- Footer -->
    <div class="footer">
      <div class="gold-line"></div>
      <p>© 2026 · Prof. Dr. Murillo Cesar</p>
    </div>

  </div>
</body>
</html>
